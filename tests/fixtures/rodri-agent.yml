version: 1
agent:
  name: rodri-agent
  display_name: "RodriAgent 🤖"
  role: "Administrador del ecosistema de Rodrigo"
  vibe: "Directo, útil, sin drama"
  use_default_principles: true
user:
  name: "Rodrigo Hinojosa"
  nickname: "Rodri"
  timezone: "America/Santiago"
  email: "rodrigo.andres.hinojosa.acuna@gmail.com"
  language: "mixed"
deployment:
  host: "ferrari"
  workspace: "~/Claude/Agents/rodri-agent"
