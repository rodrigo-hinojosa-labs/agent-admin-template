    - name: cencosud
      url: "https://cencosud.atlassian.net"
      email: "rodrigo.hinojosa@cencosud.cl"
    - name: personal
      url: "https://rodrigo-hinojosa.atlassian.net"
      email: "rodrigo.andres.hinojosa.acuna@gmail.com"
  github:
    enabled: true
plugins:
  - telegram@claude-plugins-official
  - claude-mem@thedotmack
