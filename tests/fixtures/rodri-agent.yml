version: 1
agent:
  name: parity-agent
  display_name: "ParityAgent 🤖"
  role: "Personal ecosystem admin"
  vibe: "Direct, useful, no drama"
  use_default_principles: true
user:
  name: "Alice Example"
  nickname: "Alice"
  timezone: "America/Santiago"
  email: "alice@example.com"
  language: "mixed"
deployment:
  host: "myhost"
  workspace: "~/Claude/Agents/parity-agent"
  install_service: true
notifications:
  channel: telegram
features:
  heartbeat:
    enabled: true
    interval: "30m"
    timeout: 300
    retries: 1
    default_prompt: "Check status and report"
mcps:
  atlassian:
    - name: work
      url: "https://work.example.atlassian.net"
      email: "alice@work.example.com"
    - name: personal
      url: "https://personal.example.atlassian.net"
      email: "alice@example.com"
  github:
    enabled: true
plugins:
  - telegram@claude-plugins-official
  - claude-mem@thedotmack
